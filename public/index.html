<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Task Manager</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				background: #f4f6f8;
				display: flex;
				justify-content: center;
				align-items: flex-start;
				padding: 40px;
			}

			.container {
				background: white;
				padding: 25px;
				border-radius: 12px;
				width: 500px;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
			}

			h1 {
				text-align: center;
				margin-bottom: 20px;
				color: #333;
			}

			.task-form {
				display: flex;
				gap: 10px;
				margin-bottom: 20px;
			}

			.task-form input {
				flex: 1;
				padding: 10px;
				border: 1px solid #ccc;
				border-radius: 8px;
			}

			.task-form button {
				padding: 10px 16px;
				border: none;
				background: #007bff;
				color: white;
				border-radius: 8px;
				cursor: pointer;
			}

			.task-form button:hover {
				background: #0056b3;
			}

			ul {
				list-style: none;
				padding: 0;
			}

			li {
				background: #f9f9f9;
				padding: 12px;
				margin-bottom: 10px;
				border-radius: 8px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.delete-btn {
				background: #dc3545;
				color: white;
				border: none;
				padding: 8px 12px;
				border-radius: 6px;
				cursor: pointer;
			}

			.delete-btn:hover {
				background: #a71d2a;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>Task Manager</h1>

			<div class="task-form">
				<input type="text" id="taskInput" placeholder="Enter a new task" />
				<button onclick="addTask()">Add</button>
			</div>

			<ul id="taskList"></ul>
		</div>

		<script>
			async function loadTasks() {
				const response = await fetch("/tasks");
				const tasks = await response.json();

				const taskList = document.getElementById("taskList");
				taskList.innerHTML = "";

				tasks.forEach((task) => {
					const li = document.createElement("li");
					li.innerHTML = `
          <span>${task.title}</span>
          <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
        `;
					taskList.appendChild(li);
				});
			}

			async function addTask() {
				const taskInput = document.getElementById("taskInput");
				const title = taskInput.value.trim();

				if (!title) {
					alert("Please enter a task title");
					return;
				}

				await fetch("/tasks", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ title, completed: false }),
				});

				taskInput.value = "";
				loadTasks();
			}

			async function deleteTask(id) {
				await fetch(`/tasks/${id}`, {
					method: "DELETE",
				});

				loadTasks();
			}

			loadTasks();
		</script>
	</body>
</html>
